async function loadData(){
  const res = await fetch(API_URL);
  const data = await res.json();

  recs = {};
  data.forEach(item=>{
    recs[item.id] = item.data;
  });
}

async function saveData(data){
  await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify(data)
  });
}
async function init(){
  await loadData();   // ⭐ โหลดจาก Google Sheet

}

      <div style="font-size:10px;font-weight:500;color:${PC[i]};text-transform:uppercase;letter-spacing:.5px">PLO${i+1}</div>
      <div style="font-size:18px;font-weight:500;color:${PC[i]}">${Math.round(ploTot[i])}</div>
      <div style="height:4px;background:${PC[i]};border-radius:2px;margin-top:4px;opacity:${Math.max(0.2,ploTot[i]/maxV).toFixed(2)}"></div>
    </div>`).join('')}
  </div>
  <div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">
    <div style="padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;font-weight:500">ตาราง Heatmap รายวิชา × PLO</div>
    <div style="overflow-x:auto"><table class="tbl" style="min-width:600px">
      <thead><tr><th style="width:160px">วิชา</th>${Array.from({length:10},(_,i)=>`<th style="text-align:center;color:${PC[i]};min-width:50px">PLO${i+1}</th>`).join('')}</tr></thead>
      <tbody>${hasDone.length===0?`<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--color-text-secondary)">ยังไม่มีข้อมูล</td></tr>`:hasDone.map(s=>{
        const pt=Array(10).fill(0);
        recs[s.no].rows.forEach(r=>r.plo.forEach((p,i)=>pt[i]+=parseFloat(p.pct)||0));
        const rowMax=Math.max(...pt,1);
        return`<tr><td style="font-size:11px">${yrBadge(s.yr)} ${s.name.substring(0,22)}${s.name.length>22?'…':''}</td>
        ${pt.map((v,i)=>`<td style="text-align:center;padding:6px">
          ${v>0?`<div class="heat-cell" style="background:${PCL[i]};color:${PC[i]};opacity:${Math.max(0.4,v/rowMax).toFixed(2)};margin:0 auto">${Math.round(v)}</div>`:'<span style="color:var(--color-text-secondary);font-size:11px">·</span>'}
        </td>`).join('')}</tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn" onclick="sendPrompt('วิเคราะห์ผล CLO PLO mapping และบอกว่า PLO ตัวไหนยังครอบคลุมน้อยเกินไป ↗')">วิเคราะห์ช่องว่าง PLO ↗</button>
  </div>`;
}

function renderPlan(){
  const hasDone=SUBJ.filter(s=>isDone(s.no));
  const methodCount={}, assessCount={};
  Object.values(recs).forEach(r=>r.rows.forEach(row=>{
    if(row.method){const k=row.method.replace(/\s+/g,' ').trim().substring(0,40);methodCount[k]=(methodCount[k]||0)+1;}
    if(row.assessment){const k=row.assessment.trim().substring(0,40);assessCount[k]=(assessCount[k]||0)+1;}
  }));
  const topM=Object.entries(methodCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const topA=Object.entries(assessCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxM=topM[0]?topM[0][1]:1;
  const maxA=topA[0]?topA[0][1]:1;
  return`
  <div class="section-title">แผนการจัดการเรียนการสอนและการวัดประเมินผล</div>
  <div class="grid2" style="margin-bottom:16px">
    <div class="card">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">วิธีการสอนที่ใช้</div>
      ${topM.length===0?`<div style="color:var(--color-text-secondary);font-size:13px">ยังไม่มีข้อมูล</div>`:topM.map(([k,v])=>`<div style="display:grid;grid-template-columns:1fr 36px;align-items:center;gap:8px;margin-bottom:8px">
        <div>
          <div style="font-size:12px;color:var(--color-text-primary);margin-bottom:3px">${k}</div>
          <div class="pbar-wrap"><div class="pbar-fill" style="width:${Math.round(v/maxM*100)}%;background:#185FA5"></div></div>
        </div>
        <span style="font-size:12px;font-weight:500;color:#185FA5;text-align:right">${v}×</span>
      </div>`).join('')}
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">วิธีการประเมินผลที่ใช้</div>
      ${topA.length===0?`<div style="color:var(--color-text-secondary);font-size:13px">ยังไม่มีข้อมูล</div>`:topA.map(([k,v])=>`<div style="display:grid;grid-template-columns:1fr 36px;align-items:center;gap:8px;margin-bottom:8px">
        <div>
          <div style="font-size:12px;color:var(--color-text-primary);margin-bottom:3px">${k}</div>
          <div class="pbar-wrap"><div class="pbar-fill" style="width:${Math.round(v/maxA*100)}%;background:#1D9E75"></div></div>
        </div>
        <span style="font-size:12px;font-weight:500;color:#1D9E75;text-align:right">${v}×</span>
      </div>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">รายวิชาพร้อมรายละเอียดแผนการสอน</div>
    ${hasDone.length===0?`<div style="color:var(--color-text-secondary)">ยังไม่มีข้อมูล</div>`:hasDone.map(s=>{
      const r=recs[s.no];
      const methods=[...new Set(r.rows.filter(x=>x.method).map(x=>x.method.substring(0,30)))];
      return`<div style="border-bottom:0.5px solid var(--color-border-tertiary);padding:10px 0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          ${yrBadge(s.yr)}<span style="font-size:13px;font-weight:500">${s.name}</span>
          <span style="font-size:11px;color:var(--color-text-secondary)">${s.code} | ${s.ins}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${methods.map(m=>`<span class="badge b-blue" style="font-size:10px">${m}</span>`).join('')}
          ${r.rows.filter(x=>x.assessment).map(x=>`<span class="badge b-teal" style="font-size:10px">${x.assessment.substring(0,25)}</span>`).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

  SUBJ.forEach(s=>{
    const dn=isDone(s.no);
    mcoStatus[s.no]=dn?'done':'pending';

  <div class="grid4" style="margin-bottom:16px">
    ${[['พร้อมส่ง มคอ.',sent,'#1D9E75','#E1F5EE','#085041'],['รอกรอกข้อมูล',pend,'#BA7517','#FAEEDA','#633806'],['รายวิชาทั้งหมด',SUBJ.length,'#185FA5','#E6F1FB','#0C447C']].map(([l,v,c,bg,tc])=>`
    <div style="background:${bg};border-radius:var(--border-radius-md);padding:14px 16px;border-top:3px solid ${c}">
      <div style="font-size:10px;color:${c};text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-bottom:4px">${l}</div>
      <div style="font-size:22px;font-weight:500;color:${tc}">${v}</div>
    </div>`).join('')}
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;font-weight:500">สถานะ มคอ. รายวิชา</span>
      <button class="btn btn-sm btn-blue" onclick="sendPrompt('สรุปสถานะการส่ง มคอ. 3 และ มคอ. 5 ของรายวิชาทั้งหมดในหลักสูตรพยาบาลศาสตร์ ↗')">สร้างรายงานสถานะ ↗</button>
    </div>
    <div style="overflow-x:auto"><table class="tbl">
      <thead><tr><th>รหัสวิชา</th><th>ชื่อวิชา</th><th>ปี/ภาค</th><th>อาจารย์</th><th>มคอ.3</th><th>มคอ.5</th><th>การดำเนินการ</th></tr></thead>
      <tbody>${SUBJ.map(s=>{
        const dn=isDone(s.no);
        return`<tr>
          <td style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary)">${s.code}</td>
          <td style="font-size:12px">${s.name}</td>
          <td>${yrBadge(s.yr)} <span style="font-size:10px;color:var(--color-text-secondary)">ภ${s.sem}</span></td>
          <td style="font-size:11px;color:var(--color-text-secondary)">${s.ins}</td>
          <td>${dn?`<span class="mco-badge" style="background:#E1F5EE;color:#085041">พร้อมส่ง</span>`:`<span class="mco-badge" style="background:#FAEEDA;color:#633806">รอข้อมูล</span>`}</td>
          <td><span class="mco-badge" style="background:#EEEDFE;color:#3C3489">รอส่ง</span></td>
          <td style="white-space:nowrap">
            ${dn?`<button class="btn btn-sm btn-blue" onclick="sendPrompt('สร้างเนื้อหา มคอ.3 สำหรับวิชา ${s.name} (${s.code}) ↗')">ร่าง มคอ.3 ↗</button>`:`<button class="btn btn-sm" onclick="goEdit(${s.no})">กรอกข้อมูล</button>`}
          </td></tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
}

function renderReport(){
  const done=SUBJ.filter(s=>isDone(s.no)).length;
  const total=SUBJ.length;
  const pct=Math.round(done/total*100);
  const ploTot=Array(10).fill(0);
  Object.values(recs).forEach(r=>r.rows.forEach(row=>row.plo.forEach((p,i)=>ploTot[i]+=parseFloat(p.pct)||0)));
  const topPlo=[...ploTot.map((v,i)=>({i,v}))].sort((a,b)=>b.v-a.v).slice(0,3);
  const lowPlo=[...ploTot.map((v,i)=>({i,v}))].sort((a,b)=>a.v-b.v).slice(0,3);
  const methodCount={};
  Object.values(recs).forEach(r=>r.rows.forEach(row=>{if(row.method){const k=row.method.substring(0,40);methodCount[k]=(methodCount[k]||0)+1;}}));
  const topMethod=Object.entries(methodCount).sort((a,b)=>b[1]-a[1])[0];
  return`
  <div style="background:#E6F1FB;border-radius:var(--border-radius-lg);padding:16px 20px;margin-bottom:16px;border-left:4px solid #185FA5">
    <div style="font-size:10px;color:#185FA5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">บทสรุปผู้บริหาร</div>
    <div style="font-size:16px;font-weight:500;color:#042C53;margin-bottom:6px">การออกแบบการจัดการเรียนการสอน ปีการศึกษา 2569</div>
    <div style="font-size:12px;color:#185FA5">วิทยาลัยพยาบาล — จัดทำเมื่อ ${new Date().toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}</div>
  </div>
  <div class="grid4" style="margin-bottom:16px">
    ${[['ความคืบหน้าการกรอกข้อมูล',pct+'%','#185FA5','#E6F1FB','#0C447C'],['รายวิชาที่กรอกแล้ว',done+'/'+total,'#1D9E75','#E1F5EE','#085041'],['วิชาที่รอดำเนินการ',(total-done)+' วิชา','#BA7517','#FAEEDA','#633806'],['PLO ที่ครอบคลุมสูงสุด','PLO'+(topPlo[0].i+1),'#534AB7','#EEEDFE','#3C3489']].map(([l,v,c,bg,tc])=>`
    <div style="background:${bg};border-radius:var(--border-radius-md);padding:14px 16px;border-top:3px solid ${c}">
      <div style="font-size:10px;color:${c};text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-bottom:4px">${l}</div>
      <div style="font-size:22px;font-weight:500;color:${tc}">${v}</div>
    </div>`).join('')}
  </div>
  <div class="grid2" style="margin-bottom:16px">
    <div class="card">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">PLO ที่ครอบคลุมสูงสุด 3 อันดับ</div>
      ${topPlo.map((x,rank)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:22px;height:22px;border-radius:50%;background:${PCL[x.i]};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:${PC[x.i]}">${rank+1}</div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:500;color:${PC[x.i]}">PLO${x.i+1}</div>
          <div class="pbar-wrap"><div class="pbar-fill" style="width:${Math.round(x.v/Math.max(...ploTot,1)*100)}%;background:${PC[x.i]}"></div></div>
        </div>
        <span style="font-size:12px;font-weight:500;color:${PC[x.i]}">${Math.round(x.v)}</span>
      </div>`).join('')}
      <div style="margin-top:12px;border-top:0.5px solid var(--color-border-tertiary);padding-top:10px">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">PLO ที่ต้องเสริม</div>
        ${lowPlo.filter(x=>x.v===0).map(x=>`<span class="badge b-amber" style="margin-right:4px;margin-bottom:4px">PLO${x.i+1} ยังไม่ครอบคลุม</span>`).join('')}
        ${lowPlo.filter(x=>x.v===0).length===0?'<span style="font-size:12px;color:var(--color-text-secondary)">PLO ครอบคลุมครบทุกด้าน</span>':''}
      </div>
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">สรุปการดำเนินงาน</div>
      ${[
        ['รายวิชาทั้งหมดในหลักสูตร',total+' วิชา','#185FA5','#E6F1FB'],
        ['กรอกข้อมูลการออกแบบแล้ว',done+' วิชา','#1D9E75','#E1F5EE'],
        ['ความสมบูรณ์ของข้อมูล',pct+'%','#534AB7','#EEEDFE'],
        ['ชั้นปีที่มีข้อมูลครบที่สุด','ปี 1','#BA7517','#FAEEDA'],
        ['วิธีสอนที่ใช้มากที่สุด',topMethod?topMethod[0].substring(0,25):'ยังไม่มีข้อมูล','#1D9E75','#E1F5EE'],
      ].map(([l,v,c,bg])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
        <span style="font-size:12px;color:var(--color-text-secondary)">${l}</span>
        <span class="badge" style="background:${bg};color:${c};font-size:11px">${v}</span>
      </div>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">ความคืบหน้าแยกตามชั้นปี</div>
    ${[1,2,3,4].map(yr=>{
      const tot=SUBJ.filter(s=>s.yr===yr).length;
      const dn=SUBJ.filter(s=>s.yr===yr&&isDone(s.no)).length;
      const p2=tot?Math.round(dn/tot*100):0;
      return`<div style="display:grid;grid-template-columns:56px 1fr 80px 50px;align-items:center;gap:10px;margin-bottom:8px">
        ${yrBadge(yr)}
        <div class="pbar-wrap"><div class="pbar-fill" style="width:${p2}%;background:${YR_C[yr-1]}"></div></div>
        <span style="font-size:12px;color:var(--color-text-secondary)">${dn}/${tot} วิชา</span>
        <span style="font-size:12px;font-weight:500;color:${YR_C[yr-1]};text-align:right">${p2}%</span>
      </div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-blue" onclick="sendPrompt('สร้างบทสรุปผู้บริหารฉบับสมบูรณ์สำหรับการออกแบบการจัดการเรียนการสอนหลักสูตรพยาบาลศาสตร์ ปีการศึกษา 2569 พร้อมข้อเสนอแนะ ↗')">สร้างรายงานฉบับสมบูรณ์ ↗</button>
    <button class="btn" onclick="sendPrompt('วิเคราะห์ช่องว่างของ PLO และให้คำแนะนำการปรับปรุงหลักสูตร ↗')">วิเคราะห์ช่องว่าง PLO ↗</button>
    <button class="btn" onclick="sendPrompt('สรุปผลการดำเนินงานและข้อเสนอแนะสำหรับปีการศึกษาถัดไป ↗')">ข้อเสนอแนะปีถัดไป ↗</button>
  </div>`;
}

function attachCharts(){}

function setQ(v){fQ=v;render();}
function setFY(v){fY=v;render();}
function setFS(v){fS=v;render();}
function setFSt(v){fSt=v;render();}
function addRow(){formRows.push(newRow());render();}
function rmRow(i){formRows.splice(i,1);render();}
function upd(i,f,v){formRows[i][f]=v;render();}
function updPLO(ri,pi,f,v){formRows[ri].plo[pi][f]=v;render();}

async function saveForm(){
  recs[editNo]={rows:JSON.parse(JSON.stringify(formRows)),savedAt:new Date().toISOString()};
  await persist();
  const t=document.createElement('div');
  t.style.cssText='background:#E1F5EE;color:#085041;border:0.5px solid #9FE1CB;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:500;margin-bottom:12px';
  t.textContent='บันทึกข้อมูลเรียบร้อยแล้ว';
  document.getElementById('app').insertBefore(t,document.getElementById('app').firstChild.nextSibling);
  setTimeout(()=>t.remove(),2500);
  render();
}

async function saveNew(){
  const g=id=>document.getElementById(id)?.value||'';
  const no=SUBJ.length>0?Math.max(...SUBJ.map(s=>s.no))+1:100;
  const ns={no,yr:parseInt(g('nf_yr'))||1,sem:parseInt(g('nf_sem'))||1,code:g('nf_code'),name:g('nf_name'),cred:g('nf_cred'),ins:g('nf_ins'),tb:parseFloat(g('nf_tb'))||0,tl:parseFloat(g('nf_tl'))||0,p:parseFloat(g('nf_p'))||0,ss:parseFloat(g('nf_ss'))||0};
  if(!ns.code||!ns.name){alert('กรุณากรอกรหัสวิชาและชื่อวิชา');return;}
  SUBJ.push(ns);
  addMode=false;
  render();
}

async function del(no){
  if(!confirm('ต้องการลบข้อมูลของวิชานี้?'))return;
  delete recs[no];
  await persist();
  render();
}

init();
</script>
